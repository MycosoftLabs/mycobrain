[env:mycobrain-gateway]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_extra_dirs = 
  ../common
  ../common_mdp
  ../features

lib_deps =
  jgromes/RadioLib@7.4.0
  bblanchon/ArduinoJson@^6.21.3
  makuna/NeoPixelBus@^2.7.9

lib_ldf_mode = deep

build_flags =
  -DCORE_DEBUG_LEVEL=3